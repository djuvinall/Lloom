name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.6
      - name: ruff check
        run: ruff check .

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install CPU PyTorch
        # CPU-only wheel keeps CI light; no GPU needed for the test suite.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install lloom + test deps
        run: pip install -e ".[serve,dev]"
      - name: Run tests
        # test_lloom.py: framework units on synthetic tensors.
        # test_scripts_smoke.py: full CLI pipeline on a tiny corpus (nano preset).
        run: pytest -v
